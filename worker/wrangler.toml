name = "api-test-studio-sync"
main = "worker.js"
compatibility_date = "2025-01-01"

# After running `wrangler kv:namespace create STATE`, paste the returned id here.
# Example:
# [[kv_namespaces]]
# binding = "STATE"
# id = "abcdef0123456789abcdef0123456789"
[[kv_namespaces]]
binding = "STATE"
id = "REPLACE_WITH_KV_ID"
